[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
upload_speed = 921600
upload_port = /dev/cu.usbmodem11101
monitor_port = /dev/cu.usbmodem11101
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D MIC_SAMPLE_RATE=16000
  -D MIC_FRAME_SAMPLES=320
  -D MIC_SAMPLE_SHIFT=11
  -D I2S_BCLK_PIN=5
  -D I2S_LRCLK_PIN=4
  -D I2S_DATA_PIN=6

[env:esp32s3_talk_display]
extends = env:esp32s3
build_flags =
  ${env:esp32s3.build_flags}
  -D ENABLE_SPEAKER=1
  -D SPEAKER_BCLK_PIN=7
  -D SPEAKER_LRCLK_PIN=15
  -D SPEAKER_DATA_PIN=16
  -D SPEAKER_GAIN_PERCENT=70
  -D ENABLE_OLED_DISPLAY=1
  -D OLED_SDA_PIN=8
  -D OLED_SCL_PIN=9
  -D OLED_WIDTH=128
  -D OLED_HEIGHT=64
lib_deps =
  adafruit/Adafruit GFX Library
  adafruit/Adafruit SSD1306

[env:xmini_c3_es8311]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 921600
upload_speed = 460800
upload_port = /dev/cu.usbmodem11101
monitor_port = /dev/cu.usbmodem11101
board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D MIC_SAMPLE_RATE=16000
  -D MIC_FRAME_SAMPLES=320
  -D ENABLE_ES8311_CODEC=1
  -D ENABLE_SPEAKER=1
  -D ENABLE_OLED_DISPLAY=1
  -D ES8311_ADDR=0x18
  -D ES8311_I2C_SDA_PIN=3
  -D ES8311_I2C_SCL_PIN=4
  -D I2S_DATA_PIN=5
  -D I2S_LRCLK_PIN=6
  -D I2S_BCLK_PIN=7
  -D I2S_DOUT_PIN=1
  -D I2S_MCLK_PIN=10
  -D PA_ENABLE_PIN=0
  -D SPEAKER_GAIN_PERCENT=70
  -D OLED_SDA_PIN=3
  -D OLED_SCL_PIN=4
  -D OLED_WIDTH=128
  -D OLED_HEIGHT=64
lib_deps =
  adafruit/Adafruit GFX Library
  adafruit/Adafruit SSD1306
